{% extends 'base.html' %}

{% block content %}
  <div class="card">
    <h2>Friend Recommendations for {{ user }}</h2>
    {% if recommendations %}
      <ul>
        {% for name in recommendations %}
          <li>{{ name }}</li>
        {% endfor %}
      </ul>
    {% else %}
      <p>No recommendations available at this time.</p>
    {% endif %}
    <p><a href="{{ url_for('network') }}">Back to network</a></p>
  </div>
{% endblock %}
